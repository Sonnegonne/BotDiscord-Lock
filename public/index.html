<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="base-path" content="/lock">
    
    <title>Discord Lock Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="status-bar">
                <div id="statusPill" class="status-pill"></div>
                <span id="statusText">Connexion au bot...</span>
            </div>
            <h1><i class="fas fa-shield-halved"></i> Discord Lock Manager</h1>
        </header>

        <main>
            <section id="serverPanel" class="card" style="display: none;">
                <div class="server-info">
                    <div id="serverAvatar" class="avatar"></div>
                    <div class="details">
                        <h2 id="serverName">Chargement...</h2>
                        <div class="stats">
                            <span id="channelCount">0 channels</span> • 
                            <span id="roleCount">0 rôles</span>
                        </div>
                    </div>
                </div>
            </section>

            <section id="immediatePanel" class="card" style="display: none;">
                <h3><i class="fas fa-bolt"></i> Actions Immédiates</h3>
                <div class="form-group">
                    <label>Salons à verrouiller/déverrouiller :</label>
                    <div id="quickChannels" class="checkbox-group">
                        </div>
                </div>
                <div class="form-group">
                    <label>Rôle concerné :</label>
                    <select id="quickRole">
                        </select>
                </div>
                <div class="button-group">
                    <button onclick="executeAction('lock')" class="btn-lock">
                        <i class="fas fa-lock"></i> Verrouiller
                    </button>
                    <button onclick="executeAction('unlock')" class="btn-unlock">
                        <i class="fas fa-lock-open"></i> Déverrouiller
                    </button>
                </div>
            </section>

            <section id="schedulePanel" class="card" style="display: none;">
                <h3><i class="fas fa-clock"></i> Programmer une action</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Heure :</label>
                        <input type="time" id="schedTime">
                    </div>
                    <div class="form-group">
                        <label>Action :</label>
                        <select id="schedAction">
                            <option value="lock">Verrouiller</option>
                            <option value="unlock">Déverrouiller</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Salons :</label>
                    <div id="schedChannels" class="checkbox-group">
                        </div>
                </div>
                <div class="form-group">
                    <label>Rôle :</label>
                    <select id="schedRole">
                        </select>
                </div>
                <button onclick="scheduleAction()" class="btn-primary">
                    <i class="fas fa-calendar-plus"></i> Ajouter à la planification
                </button>
            </section>

            <section id="schedulesListPanel" class="card" style="display: none;">
                <h3><i class="fas fa-list"></i> Tâches programmées</h3>
                <div id="schedulesList" class="schedule-items">
                    </div>
            </section>

            <section id="historyPanel" class="card" style="display: none;">
                <h3><i class="fas fa-history"></i> Historique</h3>
                <div id="historyList">
                    </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
